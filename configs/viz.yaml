# Render activation-geometry animations during a deploy run.
#   kind: transport -> 2D activation cloud + per-sample arrows = where the critic pushes each point
#   kind: compare   -> L2 baseline vs critic clouds side by side, under noise, over training
name: viz_default
critic: runs/critic.pt
kind: transport
corruption: 0.9
reg_lambda: 1.0
l2_lambda: 3.0e-3   # weight decay kept alongside the critic push (matches deploy c=0.9)
hidden: 64
train_n: 3000
epochs: 40
probe_k: 200        # more points = denser, prettier cloud
out: runs/viz
