# Headline animation: four runs sharing an init under heavy label noise, differing only in regularizer.
#   just training (no L2, no push) | weight decay only (L2 baseline) |
#   L2 + critic, Frobenius -> cloud contracts to a line (rank collapses) |
#   L2 + critic, log-Euclidean -> cloud stays full (rank preserved + clustered)
# Live effective-rank readout under each panel = the matching metric is what decides the geometry.
name: viz_collapse
critic: runs/critic.pt
kind: collapse
corruption: 0.9
reg_lambda: 1.0
l2_lambda: 3.0e-3    # weight decay kept in the L2-baseline and both critic panels (matches deploy c=0.9)
hidden: 64
train_n: 3000
epochs: 40
probe_k: 200
out: runs/viz
